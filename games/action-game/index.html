<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Action Game - GameMarket</title>
  <link rel="stylesheet" href="../../styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff3b30">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="game-page">
  <main>
    <section class="game-card action-game-card">
      <div class="action-game-screen">
        <div class="screen-window">
          <div id="gameCanvas" class="game-canvas">
            <div id="world" class="world"></div>
          </div>
          <div class="hud">
            <span id="score">Score: 0</span>
            <span id="lives">Lives: 3</span>
          </div>
          <div class="action-overlay">
            <div class="left-control" aria-label="移動ボタン">
              <button id="upButton" class="circle-button small-button">▲</button>
              <button id="leftButton" class="circle-button small-button">◀</button>
              <button id="downButton" class="circle-button small-button">▼</button>
              <button id="rightButton" class="circle-button small-button">▶</button>
            </div>
            <div class="right-control" aria-label="アクションボタン">
              <button id="jumpButton" class="circle-button large-button">A</button>
            </div>
          </div>
        </div>
      </div>

      <div class="game-action-copy">
        <p>左下の円形ボタンで移動し、右下の丸ボタンでジャンプします。画面内から手を離さずに操作できます。</p>
      </div>

      <button id="installButton" class="install-button">ダウンロード</button>
      <div id="instructions" class="instructions" hidden></div>
      <button id="restartButton" class="button" hidden>もう一度遊ぶ</button>
    </section>

    <section class="game-info">
      <h1>Action Game</h1>
      <p>GameBoy風の上下レイアウトで遊べるミニアクションです。キー操作は画面下部にまとめてあります。</p>
    </section>
  </main>

  <footer>
    <p><a href="../../">← マーケットへ戻る</a></p>
  </footer>

  <script src="install.js"></script>
  <script src="game.js"></script>
</body>
</html>
